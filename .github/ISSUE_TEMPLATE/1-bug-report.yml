name: aiopnsense Bug Report
description: File a bug report.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: input
    id: aiopnsense-version
    attributes:
      label: aiopnsense Version
    validations:
      required: true
  - type: input
    id: opnsense-firmware
    attributes:
      label: OPNsense Firmware
    validations:
      required: true
  - type: dropdown
    id: how-using
    attributes:
      label: How are you using aiopnsense?
      options:
        - hass-opnsense
        - Home Assistant OPNsense integration
        - directly
        - another app
        - other
    validations:
      required: true
  - type: input
    id: how-using-other
    attributes:
      label: If you selected other, describe the app or tool
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Please copy and paste any relevant logs. Redact tokens, passwords, IPs, hostnames, and other private details before posting. This will be automatically formatted into code, so no need for backticks.
      render: shell
  - type: textarea
    id: additional-details
    attributes:
      label: Additional Details
      description: Anything else we need to know?

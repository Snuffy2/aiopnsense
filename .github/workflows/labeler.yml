name: 'Pull Request Labeler'
on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - edited

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Pull Request Labeler
        uses: srvaroa/labeler@v1
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'

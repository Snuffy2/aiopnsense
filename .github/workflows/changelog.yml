name: changelog

on:
  workflow_dispatch:
  release:
    types:
      - published
      - edited

permissions:
  contents: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.x'

      - name: Install github-changelog-generator
        run: gem install github_changelog_generator --no-document

      - name: Generate changelog
        env:
          CHANGELOG_GITHUB_TOKEN: ${{ github.token }}
        run: github_changelog_generator

      - name: Commit updated changelog
        run: |
          branch="${{ github.event.repository.default_branch }}"
          if git diff --quiet -- docs/source/changelog.md .github_changelog_generator; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/source/changelog.md .github_changelog_generator
          git commit -m "Update changelog  [skip ci]"
          for attempt in 1 2 3; do
            git fetch origin "$branch"
            if ! git rebase "origin/$branch"; then
              git rebase --abort || true
              echo "Rebase conflict while updating changelog; skipping push."
              exit 0
            fi
            if git push origin "HEAD:$branch"; then
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying."
          done
          exit 1
